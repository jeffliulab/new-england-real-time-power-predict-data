name: Refresh rolling backtest

on:
  schedule:
    # 04:00 UTC every day -- ISO-NE has yesterday's 5-min zonal data
    # fully published by then (typical lag ~1-2 hours).
    - cron: '0 4 * * *'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write   # to commit refreshed data/ back to main

    steps:
      - name: Checkout this (data) repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout source-of-truth code repo
        uses: actions/checkout@v4
        with:
          repository: jeffliulab/real-time-power-predict
          ref: main
          path: code

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: code/scripts/build_rolling_backtest.requirements.txt

      - name: Install system deps for cfgrib/eccodes
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libeccodes-dev libeccodes-tools

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r code/scripts/build_rolling_backtest.requirements.txt

      - name: Build rolling backtest
        env:
          HERBIE_CONFIG_PATH: /tmp/herbie_config
          HRRR_CACHE_DIR: /tmp/hrrr_cache
        run: |
          mkdir -p data
          cd code
          python scripts/build_rolling_backtest.py \
            --output-dir ../data \
            --parallel 8

      - name: Show what was built
        run: |
          ls -la data/
          echo "--- last_built.json ---"
          cat data/last_built.json
          echo "--- backtest summary ---"
          python -c "
import json
b = json.load(open('data/backtest_rolling_7d.json'))
s = b['summary']
print(f\"  built_at: {b.get('built_at')}\")
print(f\"  forecasts: {b.get('n_forecasts')}\")
print(f\"  baseline overall MAPE: {s['baseline']['overall']:.2f}%\")
print(f\"  chronos overall MAPE:  {s['chronos']['overall']:.2f}%\")
print(f\"  ensemble overall MAPE: {s['ensemble']['overall']:.2f}%\")
"

      - name: Commit + push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to data/ -- skipping commit"
          else
            STAMP=$(date -u +'%Y-%m-%d %H:%M UTC')
            git commit -m "Auto: refresh rolling 7d backtest (${STAMP})"
            git push
          fi
